<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Meus Filmes</title>
</head>
<body>
    <form class="cadastrar-filme" novalidate>

        <h2>Cadastre um Filme </h2>

        <div class="campo">
        <label for="nome-filme">Filme</label>
        <input type="text" name="nome-filme" id="nome-filme" placeholder="Digite o nome do Filme..." required>
        <small class="erro" id="erro-nome"></small>
        </div>

        <div class="campo">
            <label for="imagem-do-filme">Imagem do Filme/Selecione uma Imagem</label>
            <input type="file" accept="image/*"  name="imagem-do-filme" id="imagem-do-filme" required>
            <small class="erro" id="erro-imagem"></small>
        </div>

        <div class="campo ">
            <label for="genero-filme">Gênero do Filme</label>
            <input type="text" name="genero-filme" id="genero-filme" placeholder="Digite o Gênero do Filme" required>
            <small class="erro" id="erro-genero"></small>
        </div>

        <div class="campo">
            <label for="nota-filme">Digite a nota do Filme</label>
            <input type="number" name="nota-filme" id="nota-filme" min="0" max="10" step="0.1" placeholder="De 0 á 10" required>
        </div>
        
        <div class="campo-assistiu">
            <small>
            <input type="checkbox" name="assistiu" id="assistiu">
            <label for="assistiu">Já Assistiu?</label>
            </small>
        </div>

        <button type="submit" class="btn-cadastrar">Cadastrar Filme</button>
    </form>

    <div class="todos-os-filmes">

        <div class="campo-busca">
        <label for="buscar-filme">🔎</label>
        <input type="search" name="buscar-filme" id="buscar-filme">
        <small class="erro" id="erro-busca"></small>
        </div>

        <div class="campo-busca">
            <select name="busca-por-genero" id="busca-por-genero">
                <option value="">Selecione o Gênero...</option>
            </select>
        </div>

        <button type="submit" id="btn-busca">Burcar Filme</button>

        
        <ul class="lista-de-filme"></ul>

    </div>
</body>
<script src="./script.js"></script>
</html>
